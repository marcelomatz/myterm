name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Cria a release no GitHub (sem assets) ───────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "myTerm ${{ github.ref_name }}"
          body: |
            ## myTerm ${{ github.ref_name }}

            ### Download

            | Plataforma | Arquivo | Tipo |
            |------------|---------|------|
            | 🪟 **Windows** | `myterm-windows-amd64-installer.exe` | Instalador NSIS (recomendado) |
            | 🪟 **Windows** | `myterm-windows-amd64.exe` | Executável portátil |
            | 🍎 **macOS** | `myterm-macos-universal.dmg` | Imagem de disco (recomendado) |
            | 🍎 **macOS** | `myterm-macos-universal.zip` | App compactado |
            | 🐧 **Linux** | `myterm-linux-amd64.tar.gz` | Binário compactado |

            ### Notas
            **Windows:** Instalador autoassinado — se o SmartScreen aparecer, clique em _More info → Run anyway_.

            **macOS:** App não notarizado — primeira execução: _System Settings → Privacy & Security → Open Anyway_.

            **Linux:** Extraia e execute. Pode ser necessário `chmod +x myterm`.

            Veja o [README](https://github.com/${{ github.repository }}) para instruções completas.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Build Windows ─────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NSIS
        run: choco install nsis --yes

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build Windows (com instalador NSIS)
        run: wails build --nsis --platform windows/amd64

      - name: Preparar assets Windows
        shell: pwsh
        run: |
          # Mostrar toda a estrutura build/ para diagnóstico
          Write-Host '=== build/ (recursivo) ===' 
          Get-ChildItem build -Recurse -ErrorAction SilentlyContinue | Select-Object FullName, Length | Format-Table

          # Portátil: build/bin/myterm.exe
          Copy-Item build\bin\myterm.exe myterm-windows-amd64.exe -ErrorAction Stop
          Write-Host "Portátil copiado OK: $(Get-Item myterm-windows-amd64.exe | Select-Object -ExpandProperty Length) bytes"

          # Instalador NSIS: varredura completa da árvore build/
          $installer = Get-ChildItem build -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match 'installer|Setup' -and $_.Extension -eq '.exe' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if ($installer) {
            Copy-Item $installer.FullName myterm-windows-amd64-installer.exe -ErrorAction Stop
            Write-Host "Instalador copiado de: $($installer.FullName)"
          } else {
            # Último recurso: qualquer .exe no build/ além do portátil
            $any = Get-ChildItem build -Recurse -Filter '*.exe' -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -ne 'myterm.exe' } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if ($any) {
              Copy-Item $any.FullName myterm-windows-amd64-installer.exe -ErrorAction Stop
              Write-Host "Instalador (fallback) copiado de: $($any.FullName)"
            } else {
              Write-Warning 'Instalador NSIS não encontrado — enviando apenas o .exe portátil'
            }
          }

      - name: Upload Windows assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $files = @('myterm-windows-amd64.exe')
          if (Test-Path 'myterm-windows-amd64-installer.exe') {
            $files += 'myterm-windows-amd64-installer.exe'
            Write-Host "Enviando portátil + instalador"
          } else {
            Write-Host "Enviando apenas portátil (instalador não encontrado)"
          }
          foreach ($f in $files) {
            gh release upload '${{ github.ref_name }}' $f --clobber
          }


  # ── Build macOS ───────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build macOS universal
        run: wails build --platform darwin/universal

      - name: Criar DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "myTerm" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "myterm.app" 175 190 \
            --hide-extension "myterm.app" \
            --app-drop-link 425 190 \
            "myterm-macos-universal.dmg" \
            "build/bin/"

      - name: Criar ZIP do .app
        run: |
          cd build/bin
          zip -r ../../myterm-macos-universal.zip myterm.app

      - name: Upload macOS assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            myterm-macos-universal.dmg
            myterm-macos-universal.zip

  # ── Build Linux ───────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências de sistema (Wails v2 / GTK)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            build-essential \
            pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build Linux
        run: wails build --platform linux/amd64

      - name: Criar tar.gz
        run: |
          cd build/bin
          tar -czf ../../myterm-linux-amd64.tar.gz myterm

      - name: Upload Linux assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            myterm-linux-amd64.tar.gz
