name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Cria a release no GitHub (sem assets) ───────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "myTerm ${{ github.ref_name }}"
          body: |
            ## myTerm ${{ github.ref_name }}

            ### Download

            | Plataforma | Arquivo | Tipo |
            |------------|---------|------|
            | 🪟 **Windows** | `myterm-windows-amd64-installer.exe` | Instalador NSIS (recomendado) |
            | 🪟 **Windows** | `myterm-windows-amd64.exe` | Executável portátil |
            | 🍎 **macOS** | `myterm-macos-universal.dmg` | Imagem de disco (recomendado) |
            | 🍎 **macOS** | `myterm-macos-universal.zip` | App compactado |
            | 🐧 **Linux** | `myterm-linux-amd64.tar.gz` | Binário compactado |

            ### Notas
            **Windows:** Instalador autoassinado — se o SmartScreen aparecer, clique em _More info → Run anyway_.

            **macOS:** App não notarizado — primeira execução: _System Settings → Privacy & Security → Open Anyway_.

            **Linux:** Extraia e execute. Pode ser necessário `chmod +x myterm`.

            Veja o [README](https://github.com/${{ github.repository }}) para instruções completas.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Build Windows ─────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build Windows
        run: wails build --nsis --platform windows/amd64

      - name: Renomear portátil
        shell: pwsh
        run: Rename-Item build\bin\myterm.exe myterm-windows-amd64.exe

      - name: Renomear instalador
        shell: pwsh
        run: |
          $old = Get-ChildItem build\bin\*installer*.exe | Select-Object -First 1
          Rename-Item $old.FullName myterm-windows-amd64-installer.exe

      - name: Upload Windows assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            build/bin/myterm-windows-amd64.exe
            build/bin/myterm-windows-amd64-installer.exe

  # ── Build macOS ───────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build macOS universal
        run: wails build --platform darwin/universal

      - name: Criar DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "myTerm" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "myterm.app" 175 190 \
            --hide-extension "myterm.app" \
            --app-drop-link 425 190 \
            "myterm-macos-universal.dmg" \
            "build/bin/"

      - name: Criar ZIP do .app
        run: |
          cd build/bin
          zip -r ../../myterm-macos-universal.zip myterm.app

      - name: Upload macOS assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            myterm-macos-universal.dmg
            myterm-macos-universal.zip

  # ── Build Linux ───────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências de sistema (Wails/GTK)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            pkg-config \
            libglib2.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build Linux
        run: wails build --platform linux/amd64

      - name: Criar tar.gz
        run: |
          cd build/bin
          tar -czf ../../myterm-linux-amd64.tar.gz myterm

      - name: Upload Linux assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            myterm-linux-amd64.tar.gz
