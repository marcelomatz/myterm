name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Cria a release no GitHub (sem assets) ───────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "myTerm ${{ github.ref_name }}"
          body: |
            ## myTerm ${{ github.ref_name }}

            ### Download

            | Plataforma | Arquivo | Tipo |
            |------------|---------|------|
            | 🪟 **Windows** | `myterm-windows-amd64-installer.exe` | Instalador NSIS (recomendado) |
            | 🪟 **Windows** | `myterm-windows-amd64.exe` | Executável portátil |
            | 🍎 **macOS** | `myterm-macos-universal.dmg` | Imagem de disco (recomendado) |
            | 🍎 **macOS** | `myterm-macos-universal.zip` | App compactado |
            | 🐧 **Linux** | `myterm-linux-amd64.tar.gz` | Binário compactado |

            ### Notas
            **Windows:** Instalador autoassinado — se o SmartScreen aparecer, clique em _More info → Run anyway_.

            **macOS:** App não notarizado — primeira execução: _System Settings → Privacy & Security → Open Anyway_.

            **Linux:** Extraia e execute. Pode ser necessário `chmod +x myterm`.

            Veja o [README](https://github.com/${{ github.repository }}) para instruções completas.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Build multi-plataforma com wails-build-action ───────────────────────────
  build:
    name: Build ${{ matrix.build.os-name }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        build:
          - { os: windows-latest, os-name: Windows, platform: windows/amd64 }
          - { os: macos-latest,   os-name: macOS,   platform: darwin/universal }
          - { os: ubuntu-latest,  os-name: Linux,   platform: linux/amd64 }
    runs-on: ${{ matrix.build.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dAppServer/wails-build-action@v3
        with:
          build-name: myterm
          build-platform: ${{ matrix.build.platform }}
          go-version: '1.22'
          node-version: '20.x'
          nsis: true
          package: false   # vamos fazer upload manual para renomear arquivos

      # ── Windows: renomear e fazer upload ──────────────────────────────────
      - name: Upload Windows assets
        if: matrix.build.os == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          Copy-Item build\bin\myterm.exe build\bin\myterm-windows-amd64.exe
          $installer = Get-ChildItem build\bin\*installer*.exe | Select-Object -First 1
          Copy-Item $installer.FullName build\bin\myterm-windows-amd64-installer.exe
          gh release upload $tag `
            build\bin\myterm-windows-amd64.exe `
            build\bin\myterm-windows-amd64-installer.exe `
            --clobber

      # ── macOS: criar DMG + ZIP e fazer upload ─────────────────────────────
      - name: Package and upload macOS assets
        if: matrix.build.os == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          brew install create-dmg
          create-dmg \
            --volname "myTerm" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "myterm.app" 175 190 \
            --hide-extension "myterm.app" \
            --app-drop-link 425 190 \
            "myterm-macos-universal.dmg" \
            "build/bin/"
          cd build/bin
          zip -r ../../myterm-macos-universal.zip myterm.app
          cd ../..
          gh release upload "${{ github.ref_name }}" \
            myterm-macos-universal.dmg \
            myterm-macos-universal.zip \
            --clobber

      # ── Linux: criar tar.gz e fazer upload ────────────────────────────────
      - name: Package and upload Linux assets
        if: matrix.build.os == 'ubuntu-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd build/bin
          tar -czf ../../myterm-linux-amd64.tar.gz myterm
          cd ../..
          gh release upload "${{ github.ref_name }}" \
            myterm-linux-amd64.tar.gz \
            --clobber
