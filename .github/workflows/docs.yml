name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
  workflow_dispatch:  # permite disparar manualmente

permissions:
  contents: read   # necessário para checkout
  pages: write     # necessário para gh-pages
  id-token: write  # necessário para autenticação com OIDC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # histórico completo para git info nos docs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mkdocs-material
          restore-keys: ${{ runner.os }}-pip-

      - name: Instalar MkDocs + plugins
        run: |
          pip install \
            mkdocs-material==9.* \
            pymdown-extensions

      - name: Build MkDocs site
        run: mkdocs build --clean --verbose

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site # O diretório onde o MkDocs constrói o site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

